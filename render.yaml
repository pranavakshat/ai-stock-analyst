services:
  - type: web
    name: ai-stock-analyst
    runtime: python
    buildCommand: pip install -r requirements.txt
    # Single worker only — APScheduler runs in-process, so >1 worker = duplicate jobs/emails
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      # Add all secrets from .env.example in the Render dashboard
      # under Environment → Add Environment Variable
